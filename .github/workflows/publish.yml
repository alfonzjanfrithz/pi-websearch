name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      # setup-node writes an _authToken placeholder that blocks OIDC.
      # Strip it so the trusted publisher flow kicks in.
      - name: Strip _authToken from .npmrc
        run: sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"

      - run: npm ci
      - run: npm publish --provenance --access public
